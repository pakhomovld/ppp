version: 2

builds:
  - main: .
    binary: pp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/pakhomovld/pp/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "pp_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: pakhomovld
      name: homebrew-tap
    homepage: https://github.com/pakhomovld/pp
    description: Universal pipe pretty-printer. Auto-detects format, adds color.
    license: MIT
    install: |
      bin.install "pp"
    test: |
      assert_match "pp version", shell_output("#{bin}/pp --version")
