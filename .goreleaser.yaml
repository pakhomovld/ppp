version: 2

builds:
  - main: .
    binary: ppp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/pakhomovld/pp/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "ppp_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: pakhomovld
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/pakhomovld/pp
    description: Universal pipe pretty-printer. Auto-detects format, adds color.
    license: MIT
    install: |
      bin.install "ppp"
    test: |
      assert_match "ppp version", shell_output("#{bin}/ppp --version")
